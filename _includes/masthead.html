<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          {% assign nav_links = site.data.navigation.main %}
          {% if page.lang == "en" %}
            {% assign nav_links = site.data.navigation.main_en %}
          {% endif %}
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            {% if page.lang == "en" %}
              <a href="{{ '/' | relative_url }}" target="_self">
                <img class="svg" src="{{ '/images/cn.svg' | relative_url }}" width="20pt">
                中文
              </a>
            {% else %}
              <a href="{{ '/en/' | relative_url }}" target="_self">
                <img class="svg" src="{{ '/images/en.svg' | relative_url }}" width="20pt">
                English
              </a>
            {% endif %}
          </li>
          {% for link in nav_links %}
            <li class="masthead__menu-item"><a href="{{ link.url | relative_url }}" target="_self">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
